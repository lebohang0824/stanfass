<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Stanfass - Bold Creative Studio">
    <meta name="author" content="Stanfass">
    <meta name="robots" content="index, follow">
    <title>Stanfass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="nav">
        <div class="nav__container">
            <a href="#" class="nav__logo">
                <span class="nav__logo-text">SF</span>
            </a>
            
            <nav class="nav__menu" id="nav-menu">
                <a href="#collections" class="nav__link">Collections</a>
                <a href="#about" class="nav__link">About</a>
                <a href="#contact" class="nav__link">Contact</a>
            </nav>
            
            <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">
                <span class="nav__toggle-line"></span>
                <span class="nav__toggle-line"></span>
                <span class="nav__toggle-line"></span>
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero__bg">
            <div class="hero__bg-texture"></div>
            <div class="hero__bg-gradient"></div>
            <div class="hero__bg-shine"></div>
        </div>
        
        <div class="hero__content">
            <span class="hero__label">Creative Studio</span>
            <h1 class="hero__title">
                <span class="hero__title-line">We Create</span>
                <span class="hero__title-line hero__title-line--accent">Digital</span>
                <span class="hero__title-line">Experiences</span>
            </h1>
            <p class="hero__tagline">Where bold ideas meet uncompromising craftsmanship. We don't follow trends—we set them.</p>
            <div class="hero__cta">
                <a href="#work" class="btn btn--primary">View Work</a>
                <a href="#contact" class="btn btn--ghost">Get in Touch</a>
            </div>
        </div>

        <div class="hero__scroll">
            <span>Scroll</span>
            <div class="hero__scroll-line"></div>
        </div>

        <div class="hero__brand">
            <span class="hero__brand-text">SF</span>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
